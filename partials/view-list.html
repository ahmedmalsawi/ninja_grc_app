    <!-- Case list view -->
    <div id="viewList" class="view-list view-visible">
      <div class="case-list-toolbar">
        <h2 id="listTitle" class="list-title">Cases</h2>
        <button type="button" class="btn btn-primary" id="btnNewCase">New case</button>
        <button type="button" class="btn" id="btnPrintListReport">Print report</button>
      </div>
      <div id="caseListContent">
        <p class="empty-state" id="emptyState">No cases yet. Click "New case" to add one.</p>
        <table class="case-table" id="caseTable" style="display:none;">
          <thead>
            <tr>
              <th id="thSeq">#</th>
              <th id="thId">Case ID</th>
              <th id="thReceived">Received</th>
              <th id="thPhase">Phase</th>
              <th id="thPath">Path</th>
              <th id="thScore">Score</th>
              <th id="thStatus">Status</th>
              <th id="thActions">Actions</th>
            </tr>
          </thead>
          <tbody id="caseTableBody"></tbody>
        </table>
      </div>
    </div>
